<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Petopia • Enter Reset Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --bg:#f6f8ff;--panel:rgba(255,255,255,.6);--panel-strong:rgba(255,255,255,.9);
      --text:#0b0f1a;--muted:#5b6378;--accent:#7cf4d1;--accent-2:#8bb6ff;
      --ring:rgba(124,244,209,0.7);--shadow:0 20px 60px rgba(16,24,40,.15);
    }
    body{margin:0;font-family:Inter,system-ui;display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);}
    .aurora{position:fixed;inset:0;filter:blur(60px);}
    .blob{position:absolute;width:60vmax;height:60vmax;border-radius:50%;mix-blend-mode:screen;opacity:.55;animation:float 18s ease-in-out infinite;}
    .blob.a{background:radial-gradient(circle at 30% 30%,var(--accent),transparent 60%);left:-20vmax;top:-10vmax;}
    .blob.b{background:radial-gradient(circle at 70% 30%,var(--accent-2),transparent 60%);right:-15vmax;top:-5vmax;}
    .blob.c{background:radial-gradient(circle at 50% 70%,#f39cff,transparent 60%);left:10vmax;bottom:-20vmax;}
    @keyframes float{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-4%,0) scale(1.05)}}
    .panel{width:min(420px,92vw);padding:32px;border-radius:20px;background:var(--panel);border:1px solid var(--panel-strong);box-shadow:var(--shadow);backdrop-filter:blur(16px);}
    h2{text-align:center;margin:0 0 8px;}
    p{text-align:center;color:var(--muted);font-size:14px;margin:0 0 18px;}
    .otp-container{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
    .otp-container input{
      width:54px;height:54px;text-align:center;font-size:20px;border-radius:14px;border:2px solid var(--accent);
      background:rgba(255,255,255,.04);color:var(--text);outline:none;pointer-events:none;
    }
    .otp-input{position:absolute;opacity:0;pointer-events:auto;width:1px;}
    .btn{width:100%;padding:14px;border:0;border-radius:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-2));cursor:pointer;color:#051014;}
    footer{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;}
  </style>
</head>
<body>
  <div class="aurora"><div class="blob a"></div><div class="blob b"></div><div class="blob c"></div></div>
  <div class="panel">
    <h2>Enter Reset Code</h2>
    <p>Please enter the 6-digit code sent to your email.</p>
    <form id="otpForm">
      <div style="position:relative;">
        <input type="text" id="hiddenOtp" maxlength="6" class="otp-input" inputmode="numeric" autofocus autocomplete="one-time-code">
        <div class="otp-container">
          <input readonly>
          <input readonly>
          <input readonly>
          <input readonly>
          <input readonly>
          <input readonly>
        </div>
      </div>
      <button class="btn" type="submit">Verify Code</button>
    </form>
  </div>
  <footer>© <span id="year"></span> Petopia</footer>

  <script>
    // Custom alert function to replace browser alert dialogs
    function showCustomAlert(type, title, message, onOkCallback) {
      const div = document.createElement('div');
      div.id = 'customAlertModal';
      div.style = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;background:rgba(0,0,0,.25);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;';
      
      // Determine icon and colors based on type
      let icon = 'ri-information-line';
      let iconBg = 'rgba(139,182,255,.15)';
      let iconColor = 'var(--accent-2)';
      let titleColor = '#23272f';
      
      if (type === 'error') {
        icon = 'ri-error-warning-line';
        iconBg = 'rgba(255,107,107,.15)';
        iconColor = 'var(--error)';
      } else if (type === 'success') {
        icon = 'ri-checkbox-circle-line';
        iconBg = 'rgba(124,244,209,.15)';
        iconColor = 'var(--accent)';
      } else if (type === 'warning') {
        icon = 'ri-alert-line';
        iconBg = 'rgba(255,193,7,.15)';
        iconColor = '#ffc107';
      }
      
      div.innerHTML = `
        <div style="background:rgba(255,255,255,.97);border-radius:18px;max-width:500px;width:90vw;box-shadow:0 10px 40px rgba(16,24,40,.22);position:relative;overflow:hidden;">
          <div style="padding:24px;text-align:center;">
            <div style="width:64px;height:64px;margin:0 auto 16px;border-radius:50%;background:${iconBg};display:flex;align-items:center;justify-content:center;">
              <i class="${icon}" style="font-size:32px;color:${iconColor};"></i>
            </div>
            <h3 style="margin:0 0 12px;font-size:20px;font-weight:700;color:${titleColor};">${title}</h3>
            <p style="margin:0 0 24px;font-size:15px;color:var(--muted);line-height:1.5;">${message}</p>
            <button id="customAlertOk" style="width:100%;padding:12px 24px;border:0;border-radius:12px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#051014;cursor:pointer;font-size:15px;">OK</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(div);
      
      const closeModal = () => {
        if (onOkCallback) onOkCallback();
        document.body.removeChild(div);
      };
      
      div.querySelector('#customAlertOk').addEventListener('click', closeModal);
      div.addEventListener('click', (e) => {
        if (e.target === div) closeModal();
      });
      
      document.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') {
          closeModal();
          document.removeEventListener('keydown', escHandler);
        }
      });
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    const hiddenInput = document.getElementById('hiddenOtp');
    const boxes = document.querySelectorAll('.otp-container input');
    const form = document.getElementById('otpForm');
    
    // code will be verified on the server

    // Sync hidden input to visual boxes
    hiddenInput.addEventListener('input', () => {
      const val = hiddenInput.value.replace(/\D/g,'').slice(0,6);
      hiddenInput.value = val;
      boxes.forEach((box, idx) => box.value = val[idx] || '');
    });

    // Focus hidden input when clicking container
    document.querySelector('.otp-container').addEventListener('click', () => hiddenInput.focus());

    // Submit handler
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const val = hiddenInput.value;
      if(val.length < 6){
        showCustomAlert('warning', 'Incomplete Code', 'Please enter the full 6-digit code.');
        return;
      }
      try{
        const res = await fetch('{{ url_for("verify_reset_code") }}',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ code: val })
        });
        const data = await res.json();
        if(data.success){
          showCustomAlert('success', 'Code Verified', 'Your reset code has been verified successfully.', function() {
            window.location.href = '{{ url_for("reset_password") }}';
          });
        }else{
          showCustomAlert('error', 'Invalid Code', data.message || 'Invalid code. Please try again.');
          hiddenInput.value = '';
          boxes.forEach(box => box.value = '');
          hiddenInput.focus();
        }
      }catch(err){
        showCustomAlert('error', 'Network Error', 'Network error. Please check your connection and try again.');
      }
    });
  </script>
</body>
</html>
