<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Petopia • Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --bg:#f6f8ff;
      --panel:rgba(255,255,255,.6);
      --panel-strong:rgba(255,255,255,.9);
      --text:#0b0f1a;
      --muted:#5b6378;
      --accent:#7cf4d1;
      --accent-2:#8bb6ff;
      --ring:rgba(124,244,209,0.7);
      --shadow:0 20px 60px rgba(16,24,40,.15);
      --error:#ff6b6b;
      --success:#4cd964;
    }
    body {
      margin:0;font-family:Inter,system-ui;display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);
    }
    .aurora{position:fixed;inset:0;filter:blur(60px);}
    .blob{position:absolute;width:60vmax;height:60vmax;border-radius:50%;mix-blend-mode:screen;opacity:.55;animation:float 18s ease-in-out infinite;}
    .blob.a{background:radial-gradient(circle at 30% 30%,var(--accent),transparent 60%);left:-20vmax;top:-10vmax;}
    .blob.b{background:radial-gradient(circle at 70% 30%,var(--accent-2),transparent 60%);right:-15vmax;top:-5vmax;}
    .blob.c{background:radial-gradient(circle at 50% 70%,#f39cff,transparent 60%);left:10vmax;bottom:-20vmax;}
    @keyframes float{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-4%,0) scale(1.05)}}
    .panel{position:relative;width:min(420px,92vw);padding:32px;border-radius:20px;background:var(--panel);border:1px solid var(--panel-strong);box-shadow:var(--shadow);backdrop-filter:blur(16px);}
    .panel h2{margin:0 0 10px;text-align:center;font-size:26px;}
    .panel p{margin:0 0 20px;text-align:center;color:var(--muted);font-size:14px;}
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid var(--accent);
      font-size: 15px;
      background: rgba(255,255,255,.04);
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="email"]::placeholder { color:#5b6378; opacity:1; font-weight:500; letter-spacing:0.01em; }
    input[type="email"]:focus { border-color: var(--ring); box-shadow:0 0 0 6px rgba(124,244,209,.15); }
    .email-feedback { font-size: 0.85rem; height:18px; transition: color .2s; }
    .btn {
      width: 100%; padding: 14px 16px; border:0; border-radius:16px; font-weight:700; cursor:pointer;
      background: linear-gradient(135deg,var(--accent),var(--accent-2)); color:#051014;
      box-shadow:0 12px 30px rgba(139,182,255,.25); box-sizing:border-box;
    }
    footer{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;}
  </style>
</head>
<body>
  <div class="aurora"><div class="blob a"></div><div class="blob b"></div><div class="blob c"></div></div>
  <div class="panel">
    <h2>Forgot Password?</h2>
    <p>Enter your email address and we’ll send you a reset code.</p>
    <form id="forgotForm">
      <input type="email" id="email" placeholder="you@example.com" required>
      <div class="email-feedback" id="emailFeedback"></div>
      <button class="btn" type="submit">Send Reset Code</button>
    </form>
  </div>
  <footer>© <span id="year"></span> Petopia</footer>

  <script>
    // Custom alert function to replace browser alert dialogs
    function showCustomAlert(type, title, message, onOkCallback) {
      const div = document.createElement('div');
      div.id = 'customAlertModal';
      div.style = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;background:rgba(0,0,0,.25);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;';
      
      // Determine icon and colors based on type
      let icon = 'ri-information-line';
      let iconBg = 'rgba(139,182,255,.15)';
      let iconColor = 'var(--accent-2)';
      let titleColor = '#23272f';
      
      if (type === 'error') {
        icon = 'ri-error-warning-line';
        iconBg = 'rgba(255,107,107,.15)';
        iconColor = 'var(--error)';
      } else if (type === 'success') {
        icon = 'ri-checkbox-circle-line';
        iconBg = 'rgba(74,222,128,.15)';
        iconColor = '#4ade80';
      } else if (type === 'warning') {
        icon = 'ri-alert-line';
        iconBg = 'rgba(255,184,107,.15)';
        iconColor = '#ffb86b';
      }
      
      div.innerHTML = `
        <div style="background:var(--panel-strong);border-radius:18px;max-width:500px;width:90vw;box-shadow:var(--shadow);position:relative;overflow:hidden;">
          <div style="padding:32px;text-align:center;">
            <div style="width:64px;height:64px;border-radius:50%;background:${iconBg};display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid ${iconColor};">
              <i class="${icon}" style="font-size:2rem;color:${iconColor};"></i>
            </div>
            <h3 style="font-size:1.5rem;font-weight:800;color:${titleColor};margin-bottom:12px;">${title}</h3>
            <p style="color:var(--muted);font-weight:600;font-size:1rem;line-height:1.6;margin-bottom:24px;">${message}</p>
            <button id="alertOk" style="padding:12px 32px;border-radius:10px;background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#051014;font-weight:700;border:none;cursor:pointer;font-size:1rem;box-shadow:0 8px 26px rgba(139,182,255,.08);transition:all .2s ease;">OK</button>
          </div>
        </div>
      `;
      document.body.appendChild(div);
      
      const closeHandler = function() {
        div.remove();
        if (onOkCallback) {
          onOkCallback();
        }
      };
      
      document.getElementById('alertOk').addEventListener('click', closeHandler);
      
      div.addEventListener('click', function(e) {
        if (e.target === div) closeHandler();
      });
      
      const escapeHandler = function(e) {
        if (e.key === 'Escape') {
          closeHandler();
          document.removeEventListener('keydown', escapeHandler);
        }
      };
      document.addEventListener('keydown', escapeHandler);
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    const emailInput = document.getElementById('email');
    const feedback = document.getElementById('emailFeedback');
    const form = document.getElementById('forgotForm');

    // Real-time email validity checker
    emailInput.addEventListener('input', () => {
      const email = emailInput.value.trim();
      const emailPattern = /^[^\s@]+@(gmail|yahoo)\.com$/i;
      if(email === ''){
        feedback.textContent = '';
      } else if(emailPattern.test(email)){
        feedback.textContent = 'Valid email address';
        feedback.style.color = 'var(--success)';
      } else {
        feedback.textContent = 'Invalid email address';
        feedback.style.color = 'var(--error)';
      }
    });

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      const email = emailInput.value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/i;

      if(!emailPattern.test(email)){
        showCustomAlert('error', 'Invalid Email', 'Please enter a valid email address.');
        emailInput.focus();
        return;
      }

      try{
        const res = await fetch('{{ url_for("forgot_password") }}',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if(data.success){
          showCustomAlert('success', 'Reset Code Sent', 'A password reset code has been sent to your email address.', function() {
            window.location.href = '{{ url_for("reset_code") }}';
          });
        }else{
          showCustomAlert('error', 'Request Failed', data.message || 'Failed to send reset code. Please try again.');
        }
      }catch(err){
        showCustomAlert('error', 'Network Error', 'Network error. Please check your connection and try again.');
      }
    });
  </script>
</body>
</html>
